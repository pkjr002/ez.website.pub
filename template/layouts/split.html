<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>{{PAGE_TITLE}} | {{SITE_NAME}}</title>

  <link rel="stylesheet" href="assets/css/theme.css" />
  <link rel="stylesheet" href="assets/css/base.css" />
</head>
<body>
  <div class="site-shell layout-split">
    <header class="split-hero">
      <div class="split-text">
        <h1>{{SITE_NAME}}</h1>
        <p class="eyebrow">{{SITE_TYPE}}</p>
        <p class="tagline">{{TAGLINE}}</p>

        <nav class="nav">
          {{NAV}}
        </nav>
      </div>

      <div class="split-media">
        <div class="split-media-inner">
          {{PROFILE_BLOCK}}
          <img class="hero-illustration" src="{{HERO_IMAGE}}" alt="Theme illustration" />
        </div>
      </div>
    </header>

    <main class="container">
      <article class="card markdown-body">
        {{CONTENT}}
      </article>
    </main>

    <footer class="footer">
      {{FOOTER_TEXT}}
    </footer>
  </div>
</body>
</html>
