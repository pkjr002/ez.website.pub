<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>{{PAGE_TITLE}} | {{SITE_NAME}}</title>

  <link rel="stylesheet" href="assets/css/theme.css" />
  <link rel="stylesheet" href="assets/css/base.css" />
</head>
<body>
  <div class="site-shell layout-cards">
    <header class="cards-hero">
      <div class="cards-hero-inner">
        <div>
          <h1>{{SITE_NAME}}</h1>
          <p class="eyebrow">{{SITE_TYPE}}</p>
          <p class="tagline">{{TAGLINE}}</p>

          <nav class="nav">
            {{NAV}}
          </nav>
        </div>

        <div>
          {{PROFILE_BLOCK}}
        </div>
      </div>
    </header>

    <main class="cards-main">
      <div class="content-grid">
        <article class="card markdown-body">
          {{CONTENT}}
        </article>
      </div>
    </main>

    <footer class="footer">
      {{FOOTER_TEXT}}
    </footer>
  </div>
</body>
</html>
